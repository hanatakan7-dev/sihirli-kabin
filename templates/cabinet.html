<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sihirli Kabinim</title>

    <style>

        body{
            background:#f5f5f5;
            font-family:Arial;
            padding:20px;
        }

        h1{
            color:purple;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:20px;
        }

        .card{
            background:white;
            padding:15px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        button{
            background:gold;
            border:none;
            padding:10px;
            width:100%;
            border-radius:10px;
            cursor:pointer;
        }

    </style>

</head>
<body>

<h1>Sihirli Kabinim ✨</h1>

<div class="grid">

{% for item in items %}

<div class="card">

    <h3>{{ item["name"] }}</h3>

    <p>{{ item["price"] }} TL</p>

    <a href="/try/{{ item['id'] }}">
        <button>
            Şimdi Dene
        </button>
    </a>

</div>

{% endfor %}

</div>

</body>
</html>
