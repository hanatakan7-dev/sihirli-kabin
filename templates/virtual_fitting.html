<!-- templates/virtual_fitting.html -->

<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Sanal Deneme</title>

    <link rel="stylesheet"
          href="/static/css/style.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            background:
            linear-gradient(
                135deg,
                #0f0f0f,
                #1b1027
            );

            min-height:100vh;

            color:white;

            display:flex;
            justify-content:center;
        }

        .app{

            width:100%;
            max-width:430px;

            min-height:100vh;

            padding:20px;
        }

        /* HEADER */

        .topbar{

            display:flex;
            justify-content:space-between;
            align-items:center;

            margin-bottom:25px;
        }

        .back-btn{

            width:45px;
            height:45px;

            border-radius:14px;

            background:
            rgba(255,255,255,0.08);

            display:flex;
            align-items:center;
            justify-content:center;

            text-decoration:none;

            color:white;

            font-size:20px;

            backdrop-filter:blur(10px);
        }

        .topbar h3{

            font-size:20px;
            font-weight:600;
        }

        .settings-btn{

            width:45px;
            height:45px;

            border:none;

            border-radius:14px;

            background:
            rgba(255,255,255,0.08);

            color:white;

            font-size:18px;

            cursor:pointer;

            backdrop-filter:blur(10px);
        }

        /* HERO */

        .hero-title{

            text-align:center;

            font-size:34px;

            font-weight:700;

            margin-top:10px;
            margin-bottom:12px;

            background:
            linear-gradient(
                45deg,
                #ffffff,
                #d4af37
            );

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .hero-sub{

            text-align:center;

            color:#bbbbbb;

            line-height:1.8;

            font-size:15px;

            margin-bottom:30px;
        }

        /* PRODUCT CARD */

        .preview{

            background:
            rgba(255,255,255,0.06);

            border:
            1px solid rgba(255,255,255,0.08);

            border-radius:32px;

            padding:28px;

            backdrop-filter:blur(18px);

            box-shadow:
            0 20px 50px rgba(0,0,0,0.35);

            overflow:hidden;

            position:relative;
        }

        .preview::before{

            content:"";

            position:absolute;

            width:220px;
            height:220px;

            background:
            rgba(199,125,255,0.15);

            border-radius:50%;

            top:-100px;
            right:-100px;

            filter:blur(20px);
        }

        .product-image-wrapper{

            position:relative;

            z-index:2;

            display:flex;
            justify-content:center;
        }

        .preview img{

            width:260px;
            height:260px;

            object-fit:contain;

            background:#111111;

            border-radius:26px;

            padding:20px;

            border:
            2px solid rgba(255,255,255,0.06);
        }

        .ai-badge{

            position:absolute;

            top:18px;
            left:18px;

            z-index:5;

            padding:10px 14px;

            border-radius:999px;

            background:
            linear-gradient(
                45deg,
                #6a0dad,
                #c77dff
            );

            color:white;

            font-size:13px;
            font-weight:600;

            box-shadow:
            0 0 20px rgba(199,125,255,0.4);
        }

        /* PRODUCT INFO */

        .product-info{

            position:relative;

            z-index:2;

            margin-top:25px;

            text-align:center;
        }

        .product-info h2{

            font-size:28px;

            color:#ffffff;

            margin-bottom:10px;
        }

        .price{

            font-size:24px;

            font-weight:700;

            color:gold;

            margin-bottom:30px;
        }

        /* FEATURES */

        .ai-features{

            display:grid;

            grid-template-columns:
            repeat(2,1fr);

            gap:15px;

            margin-top:10px;
        }

        .feature{

            background:
            rgba(255,255,255,0.05);

            border:
            1px solid rgba(255,255,255,0.06);

            border-radius:20px;

            padding:22px 14px;

            text-align:center;

            transition:0.3s;

            font-size:14px;

            line-height:1.7;
        }

        .feature:hover{

            transform:translateY(-4px);

            box-shadow:
            0 10px 25px rgba(199,125,255,0.18);
        }

        /* BUTTON */

        .camera-btn{

            display:flex;

            justify-content:center;
            align-items:center;

            gap:10px;

            margin-top:35px;

            width:100%;

            padding:22px;

            border-radius:24px;

            text-align:center;

            text-decoration:none;

            font-size:18px;

            font-weight:700;

            background:
            linear-gradient(
                45deg,
                #7b2cbf,
                #c77dff
            );

            color:white;

            transition:0.3s;

            box-shadow:
            0 15px 35px rgba(123,44,191,0.35);
        }

        .camera-btn:hover{

            transform:translateY(-3px);

            box-shadow:
            0 20px 40px rgba(199,125,255,0.35);
        }

        /* MOBILE */

        @media(max-width:390px){

            .hero-title{
                font-size:28px;
            }

            .preview{
                padding:22px;
            }

            .preview img{
                width:220px;
                height:220px;
            }

        }

    </style>

</head>

<body>

<div class="app">

    <!-- HEADER -->

    <div class="topbar">

        <a href="/"
           class="back-btn">
            ←
        </a>

        <h3>Şimdi Dene</h3>

        <button class="settings-btn">
            ⚙
        </button>

    </div>

    <!-- TITLE -->

    <div class="hero-title">

        AI Sanal Deneme ✨

    </div>

    <div class="hero-sub">

        Yapay zeka ile ürünü analiz ederek
        gerçek zamanlı sanal deneme deneyimi yaşa.

    </div>

    <!-- PRODUCT CARD -->

    <div class="preview">

        <div class="ai-badge">
            AI POWERED
        </div>

        <div class="product-image-wrapper">

            <img
                src="/static/uploads/{{ product['image'] }}"
                alt="Ürün Görseli"
            >

        </div>

        <div class="product-info">

            <h2>
                {{ product["name"] }}
            </h2>

            <p class="price">
                {{ product["price"] }} TL
            </p>

            <!-- FEATURES -->

            <div class="ai-features">

                <div class="feature">
                    🤖<br>
                    AI Pose Tracking
                </div>

                <div class="feature">
                    📏<br>
                    Body Analysis
                </div>

                <div class="feature">
                    👕<br>
                    Smart Overlay
                </div>

                <div class="feature">
                    ⚡<br>
                    Real-Time Fitting
                </div>

            </div>

            <!-- CAMERA BUTTON -->

            <a
                class="camera-btn"
                href="/ai-camera"
            >
                📷 Kamerayı Başlat
            </a>

        </div>

    </div>

</div>

</body>
</html>
