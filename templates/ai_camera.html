<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sihirli Kabin AI</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:
            linear-gradient(
                135deg,
                #0f0f0f,
                #1b1027
            );

            font-family:Arial;

            min-height:100vh;

            color:white;

            overflow:hidden;
        }

        /* APP */

        .app{

            width:100%;

            max-width:1400px;

            margin:auto;

            padding:30px;
        }

        /* HEADER */

        .header{

            display:flex;

            justify-content:space-between;

            align-items:center;

            margin-bottom:30px;
        }

        .logo{

            font-size:42px;

            font-weight:bold;
        }

        .logo span{

            color:#c77dff;
        }

        .status{

            display:flex;

            align-items:center;

            gap:12px;

            background:
            rgba(255,255,255,0.05);

            padding:14px 22px;

            border-radius:20px;

            backdrop-filter:blur(10px);
        }

        .dot{

            width:14px;

            height:14px;

            border-radius:50%;

            background:#00ff88;

            animation:pulse 1s infinite;
        }

        @keyframes pulse{

            0%{
                transform:scale(1);
                opacity:1;
            }

            100%{
                transform:scale(1.8);
                opacity:0;
            }
        }

        /* MAIN */

        .main{

            display:grid;

            grid-template-columns:
            1fr 340px;

            gap:25px;
        }

        /* CAMERA */

        .camera-card{

            background:
            rgba(255,255,255,0.05);

            border-radius:35px;

            padding:20px;

            position:relative;

            overflow:hidden;

            backdrop-filter:blur(12px);

            box-shadow:
            0 20px 60px rgba(0,0,0,0.25);
        }

        .camera-title{

            font-size:24px;

            margin-bottom:20px;
        }

        .camera-box{

            width:100%;

            border-radius:30px;

            overflow:hidden;

            position:relative;
        }

        .camera-box img{

            width:100%;

            display:block;

            border-radius:30px;
        }

        /* SCAN */

        .scan-line{

            position:absolute;

            width:100%;

            height:4px;

            background:#c77dff;

            top:0;

            animation:scan 3s linear infinite;

            box-shadow:
            0 0 20px #c77dff;
        }

        @keyframes scan{

            0%{
                top:0;
            }

            100%{
                top:100%;
            }
        }

        /* SIDE PANEL */

        .side-panel{

            background:
            rgba(255,255,255,0.05);

            border-radius:35px;

            padding:30px;

            backdrop-filter:blur(12px);

            box-shadow:
            0 20px 60px rgba(0,0,0,0.25);

            display:flex;

            flex-direction:column;

            justify-content:space-between;
        }

        .panel-title{

            font-size:26px;

            margin-bottom:20px;
        }

        .panel-text{

            color:#ccc;

            line-height:1.8;

            margin-bottom:30px;
        }

        /* AI ITEMS */

        .ai-item{

            background:
            rgba(255,255,255,0.04);

            padding:18px;

            border-radius:20px;

            margin-bottom:15px;

            border:
            1px solid rgba(255,255,255,0.08);
        }

        /* BUTTON */

        .capture-btn{

            width:100%;

            padding:20px;

            border:none;

            border-radius:25px;

            background:
            linear-gradient(
                45deg,
                #7b2cbf,
                #c77dff
            );

            color:white;

            font-size:18px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        .capture-btn:hover{

            transform:translateY(-3px);

            box-shadow:
            0 10px 25px rgba(199,125,255,0.4);
        }

        /* PROCESSING */

        .processing{

            position:fixed;

            inset:0;

            background:
            rgba(0,0,0,0.82);

            display:none;

            justify-content:center;

            align-items:center;

            flex-direction:column;

            z-index:999;
        }

        .loader{

            width:150px;

            height:150px;

            border-radius:50%;

            border:8px solid
            rgba(255,255,255,0.1);

            border-top:8px solid #c77dff;

            animation:spin 1s linear infinite;

            margin-bottom:30px;
        }

        @keyframes spin{

            100%{
                transform:rotate(360deg);
            }
        }

        .processing-title{

            font-size:30px;

            margin-bottom:15px;
        }

        .processing-sub{

            color:#ccc;

            font-size:18px;
        }

        /* RESULT PREVIEW */

        .preview{

            margin-top:25px;

            display:none;
        }

        .preview img{

            width:100%;

            border-radius:25px;

            border:
            2px solid rgba(255,255,255,0.08);
        }

        /* MOBILE */

        @media(max-width:1100px){

            .main{

                grid-template-columns:1fr;
            }

            .side-panel{

                width:100%;
            }

        }

    </style>

</head>

<body>

<div class="app">

    <!-- HEADER -->

    <div class="header">

        <div class="logo">
            Sihirli <span>Kabin</span>
        </div>

        <div class="status">

            <div class="dot"></div>

            AI Smart Mirror Active

        </div>

    </div>

    <!-- MAIN -->

    <div class="main">

        <!-- CAMERA -->

        <div class="camera-card">

            <div class="camera-title">
                AI Kamera Takibi
            </div>

            <div class="camera-box">

                <div class="scan-line"></div>

                <img src="/camera">

            </div>

        </div>

        <!-- SIDE -->

        <div class="side-panel">

            <div>

                <div class="panel-title">
                    AI Analiz Sistemi
                </div>

                <div class="panel-text">

                    Kamera üzerinden canlı pose tracking
                    ve AI vücut analizi çalışıyor.

                </div>

                <div class="ai-item">
                    ✓ Pose Tracking Aktif
                </div>

                <div class="ai-item">
                    ✓ AI Landmark Detection
                </div>

                <div class="ai-item">
                    ✓ Smart Body Analysis
                </div>

                <div class="ai-item">
                    ✓ AI Capture System
                </div>

                <!-- PREVIEW -->

                <div class="preview"
                     id="previewBox">

                    <img
                        id="previewImage"
                        src=""
                    >

                </div>

            </div>

            <button
                class="capture-btn"
                onclick="startAI()"
            >
                AI Fotoğraf Çek
            </button>

        </div>

    </div>

</div>

<!-- PROCESSING -->

<div class="processing"
     id="processing">

    <div class="loader"></div>

    <div class="processing-title">
        AI İşleniyor
    </div>

    <div class="processing-sub">
        Görüntü analiz ediliyor...
    </div>

</div>

<script>

function startAI(){

    const processing =
    document.getElementById(
        "processing"
    )

    processing.style.display =
    "flex"

    fetch("/capture")

    .then(response => response.json())

    .then(data => {

        console.log(data)

        setTimeout(() => {

            processing.style.display =
            "none"

            if(data.status === "success"){

                // PREVIEW

                const preview =
                document.getElementById(
                    "previewBox"
                )

                const previewImage =
                document.getElementById(
                    "previewImage"
                )

                preview.style.display =
                "block"

                previewImage.src =
                "/" + data.result

                // RESULT PAGE

                setTimeout(() => {

                    window.location.href =

                    "/result-page?img="

                    + data.result

                }, 1500)

            }

        }, 2500)

    })

    .catch(error => {

        processing.style.display =
        "none"

        alert(
            "AI işleminde hata oluştu"
        )

        console.log(error)

    })

}

</script>

</body>
</html>
