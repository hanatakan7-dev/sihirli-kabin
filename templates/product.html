<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürün Detayı</title>

    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="mobile-app">

    <header class="page-header">
        <a href="/">←</a>
        <h2>Ürün Detayı</h2>
        <span>♡</span>
    </header>

    <section class="product-detail-image purple"></section>

    <section class="product-detail-content">

        <h1>Saten Midi Elbise</h1>

        <div class="rating-row">
            ⭐ 4.8 <span>(128)</span>
        </div>

        <h2>₺1299</h2>

        <div class="color-select">

            <h4>Renkler</h4>

            <div class="color-row">

                <div class="color active purple-bg"></div>
                <div class="color black-bg"></div>
                <div class="color gold-bg"></div>

            </div>

        </div>

        <div class="size-select">

            <h4>Beden</h4>

            <div class="size-row">

                <button>XS</button>
                <button>S</button>
                <button class="active-size">M</button>
                <button>L</button>
                <button>XL</button>

            </div>

        </div>

        <button class="cart-btn">
            Sepete Ekle
        </button>

        <a href="/tryon">
            <button class="try-btn">
                Şimdi Dene ✨
            </button>
        </a>

    </section>

</div>

</body>
</html>
